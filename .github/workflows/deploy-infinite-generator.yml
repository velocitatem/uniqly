name: Deploy Infinite Generator to VPS

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/worker/**'
      - 'apps/backend/**'
  workflow_dispatch: # Allow manual triggers

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Copy files to deployment directory
      run: |
        # Create deployment directory if it doesn't exist
        mkdir -p /home/runner/infinite-generator

        # Copy all files from workspace to deployment directory
        cp -r $GITHUB_WORKSPACE/* /home/runner/infinite-generator/ || true
        cp -r $GITHUB_WORKSPACE/.[^.]* /home/runner/infinite-generator/ 2>/dev/null || true

    - name: Create environment file
      run: |
        cd /home/runner/infinite-generator

        # Create .env file with deployment settings
        cat > .env << 'EOF'
        NAME=infinite-gen
        COMPOSE_PROJECT_NAME=infinite-gen

        # Backend Configuration
        BACKEND_MODE=fastapi
        BACKEND_PORT=9812

        # Port Configuration
        REDIS_PORT=6379

        # Redis Configuration
        REDIS_URL=redis://localhost:6379

        # Infinite Generator Configuration
        CONTEXT_X=Startup ideas in the AI space for the year twenty twenty six
        CONTEXT_ID=ai-startup-2026
        GENERATION_INTERVAL=3600
        MAX_QUEUE_SIZE=1000

        # OpenAI Configuration
        OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
        MODEL_CHAT=gpt-4o-mini-2024-07-18
        MODEL_EMBED=text-embedding-3-small
        EOF

    - name: Stop existing containers
      run: |
        cd /home/runner/infinite-generator
        docker compose down redis worker infinite-api || true

    - name: Pull latest images
      run: |
        cd /home/runner/infinite-generator
        docker compose pull redis || true

    - name: Build and start infinite generator services
      run: |
        cd /home/runner/infinite-generator
        docker compose up -d --build redis worker infinite-api

    - name: Wait for services to be ready
      run: |
        echo "Waiting for services to start..."
        sleep 45

    - name: Check service health
      run: |
        cd /home/runner/infinite-generator
        docker compose ps

        # Check if API is responding
        echo "Checking API health..."
        timeout 60 bash -c 'until curl -f http://localhost:9812/health 2>/dev/null; do sleep 2; done' || echo "API health check failed"

        # Check API status
        echo "Checking API status..."
        curl -s http://localhost:9812/status | jq . || echo "Status endpoint failed"

        # Trigger initial generation
        echo "Triggering initial generation..."

    - name: Clean up old images
      run: |
        docker image prune -f || true

    - name: Show deployment status
      run: |
        echo "Infinite Generator deployment completed!"
        echo "Context: Startup ideas in the AI space for the year twenty twenty six"
        echo ""
        echo "Available endpoints:"
        echo "  GET /status - Check generation status"
        echo "  GET /next/5 - Get next 5 suggestions from queue"
        echo "  GET /random/3 - Get 3 random suggestions"
        echo "  POST /generate - Manually trigger generation"
        echo ""

        cd /home/runner/infinite-generator
        echo "Running containers:"
        docker compose ps redis worker infinite-api
