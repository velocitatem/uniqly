# Redis configuration for infinite suggestion generator
# Ensures Redis is always writable and properly configured

# Persistence configuration
save 900 1
save 300 10
save 60 10000

# AOF (Append Only File) configuration for durability
appendonly yes
appendfsync everysec

# Memory and performance
maxmemory-policy allkeys-lru
tcp-keepalive 300

# Security - ensure this is writable (not read-only)
# Note: In production, add proper authentication
protected-mode no

# Logging
loglevel notice

# Ensure this instance is a master (writable)
# This prevents any replica configuration
replica-read-only no

# Network configuration
bind 0.0.0.0
port 6379

# Disable dangerous commands in production
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command KEYS ""

# Enable RDB compression
rdbcompression yes
rdbchecksum yes

# Set databases
databases 16